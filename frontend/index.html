<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory & Order Management</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #cfe0c3;
        color: #1a2a30;
        transition: background 0.3s, color 0.3s;
      }
      .init-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        flex-direction: column;
      }
      .init-loader .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #b8cfb8;
        border-top-color: #40798c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .init-loader .brand {
        margin-top: 20px;
        font-size: 1.5rem;
        font-weight: 700;
        color: #1f363d;
        letter-spacing: 0.05em;
      }
      .init-loader .sub {
        margin-top: 6px;
        font-size: 0.85rem;
        color: #4a6a75;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="init-loader">
        <div class="spinner"></div>
        <div class="brand">IMS</div>
        <div class="sub">Loading application...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
